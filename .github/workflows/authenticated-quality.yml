name: Authenticated quality
on:
  workflow_dispatch:
  schedule:
    - cron: "23 10 * * 1-5"
jobs:
  authenticated-smoke:
    runs-on: ubuntu-latest
    env:
      FLOWOPS_BASE_URL: https://rainbow-lokum-1fad14.netlify.app
      FLOWOPS_E2E_EMAIL: ${{ secrets.FLOWOPS_E2E_EMAIL }}
      FLOWOPS_E2E_PASSWORD: ${{ secrets.FLOWOPS_E2E_PASSWORD }}
      FLOWOPS_E2E_TENANT_NAME: ${{ secrets.FLOWOPS_E2E_TENANT_NAME }}
      FLOWOPS_E2E_FORBIDDEN_TEXT: ${{ secrets.FLOWOPS_E2E_FORBIDDEN_TEXT }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate required credentials
        run: |
          test -n "$FLOWOPS_E2E_EMAIL" || (echo "FLOWOPS_E2E_EMAIL ausente" && exit 1)
          test -n "$FLOWOPS_E2E_PASSWORD" || (echo "FLOWOPS_E2E_PASSWORD ausente" && exit 1)
          test -n "$FLOWOPS_E2E_TENANT_NAME" || (echo "FLOWOPS_E2E_TENANT_NAME ausente" && exit 1)
          test -n "$FLOWOPS_E2E_FORBIDDEN_TEXT" || (echo "FLOWOPS_E2E_FORBIDDEN_TEXT ausente" && exit 1)
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test tests/e2e/authenticated-smoke.spec.js --project=desktop --project=mobile
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: authenticated-playwright-report
          path: test-results
          retention-days: 14
